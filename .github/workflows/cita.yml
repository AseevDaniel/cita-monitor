name: Cita Monitor

on:
  schedule:
    # Каждые 10 минут. Можно ставить */5, но Actions иногда задерживает запуски.
    - cron: '*/10 * * * *'
  workflow_dispatch: # Кнопка для ручного запуска

# Нужно чтобы Action мог коммитить state.json обратно в репу
permissions:
  contents: write

# Защита от параллельных запусков (на случай если предыдущий подзавис)
concurrency:
  group: cita-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run monitor
        run: node cita-monitor.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain state.json) ]]; then
            git add state.json
            git commit -m "Update state [skip ci]"
            git push
          else
            echo "No state changes"
          fi
